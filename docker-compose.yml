services:
  postgres:
    image: postgres:16-alpine
    container_name: vrs-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-vrs_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vrs_password}
      POSTGRES_DB: ${DB_NAME:-vrs_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vrs_user} -d ${DB_NAME:-vrs_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: vrs-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-vrs_user}:${DB_PASSWORD:-vrs_password}@postgres:5432/${DB_NAME:-vrs_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      QR_EXPIRES_MINUTES: ${QR_EXPIRES_MINUTES:-1440}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: vrs_postgres_data
