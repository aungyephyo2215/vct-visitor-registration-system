version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vrs-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-vrs_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vrs_password}
      POSTGRES_DB: ${DB_NAME:-vrs_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vrs_user} -d ${DB_NAME:-vrs_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    name: vrs_postgres_data
