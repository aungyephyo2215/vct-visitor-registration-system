# ArgoCD Application for Logging Stack (Loki + Promtail)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging-stack
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: logging-stack
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # TODO: Update repoURL to your actual Git repository
    repoURL: https://github.com/aungyephyo2215/vct-visitor-registration-system.git
    targetRevision: staging/argocd-k8s-lab
    path: k8s/base/logging
    # Helm values for Loki + Promtail
    helm:
      releaseName: loki
      values: |
        ## Loki Configuration
        loki:
          auth_enabled: false
          server:
            http_listen_port: 3100
          common:
            path_prefix: /loki
            storage:
              filesystem:
                chunks_directory: /loki/chunks
                rules_directory: /loki/rules
            replication_factor: 1
            ring:
              instance_addr: 127.0.0.1
              kvstore:
                store: inmemory
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          storageConfig:
            filesystem:
              directory: /loki/chunks
          limits_config:
            retention_period: 14d
            max_query_length: 721h
            ingestion_rate_mb: 10
            ingestion_burst_size_mb: 20
          compactor:
            working_directory: /loki/compactor
            compaction_interval: 10m
            retention_enabled: true

        ## Single Binary Mode
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            size: 10Gi
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi

        ## Monitoring
        monitoring:
          serviceMonitor:
            enabled: true
            namespace: monitoring

        ## Promtail Configuration
        promtail:
          enabled: true
          config:
            clients:
              - url: http://loki-gateway.logging.svc.cluster.local:80/loki/api/v1/push
            snippets:
              pipelineStages:
                - docker: {}
                - kubernetes:
                    namespace: true
                    pod_name: true
                    container_name: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          persistence:
            enabled: true
            size: 2Gi
          serviceMonitor:
            enabled: true
            namespace: monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Ignore known cosmetic differences
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .spec.volumeClaimTemplates[]
      jsonPointers:
        - /metadata/managedFields
        - /spec/updateStrategy/rollingUpdate
        - /spec/podManagementPolicy
  info:
    - name: environment
      value: staging
    - name: team
      value: visitor-registration
    - name: stack
      value: logging
