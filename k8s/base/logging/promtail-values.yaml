# Promtail Configuration for Visitor Registration System
# Based on Grafana Promtail Helm chart

## Promtail Configuration
config:
  clients:
    - url: http://loki-gateway.logging.svc.cluster.local:80/loki/api/v1/push
      tenant_id: ""

  snippets:
    pipelineStages:
      # Docker/Kubernetes log format
      - docker: {}

      # Kubernetes metadata
      - kubernetes:
          namespace: true
          pod_name: true
          container_name: true
          labels:
            app:
              app: true
            app.kubernetes.io/name:
              app_kubernetes_io_name: true
            app.kubernetes.io/instance:
              app_kubernetes_io_instance: true

      # JSON parsing for structured logs
      - match:
          selector: '{namespace="vrs-app"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: message
                  trace_id: trace_id
                  request_id: request_id
            - labels:
                level:
                trace_id:
                request_id:

      # Timestamp extraction
      - timestamp:
          source: time
          format: RFC3339
          fallback_formats:
            - RFC3339Nano
            - UnixMs

      # Level mapping
      - match:
          selector: '{namespace="vrs-app"}'
          stages:
            - template:
                source: level
                template: '{{ if or (eq .Value "error") (eq .Value "ERROR") }}error{{ else if or (eq .Value "warn") (eq .Value "WARN") }}warning{{ else if or (eq .Value "info") (eq .Value "INFO") }}info{{ else if or (eq .Value "debug") (eq .Value "DEBUG") }}debug{{ else }}unknown{{ end }}'
            - labels:
                level:

      # Drop debug logs in production
      - match:
          selector: '{namespace="vrs-app", level="debug"}'
          stages:
            - drop:
                expression: ".*"
                older_than: 1h

## Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

## Persistence
persistence:
  enabled: true
  size: 2Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

## Service Account
serviceAccount:
  create: true
  name: promtail

## RBAC
rbac:
  create: true

## Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9080"
  prometheus.io/path: "/metrics"

## Service
service:
  type: ClusterIP
  port: 9080

## Tolerations (to run on all nodes)
tolerations:
  - effect: NoSchedule
    operator: Exists

## Affinity (run on all nodes)
affinity: {}

## Metrics
metrics:
  serviceMonitor:
    enabled: true
    namespace: monitoring
    labels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/part-of: monitoring-stack

## Extra command line arguments
extraArgs:
  - -log.level=info

## Environment variables
env:
  - name: HOSTNAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

## Volume mounts for log access
volumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: containers
    mountPath: /var/lib/docker/containers
    readOnly: true

## Volumes
volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: containers
    hostPath:
      path: /var/lib/docker/containers
