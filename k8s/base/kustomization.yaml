apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: visitor-registration-system

resources:
  # Namespace
  - namespace.yaml
  # Config
  - configmap.yaml
  - secret.yaml
  # PostgreSQL
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  # App
  - app-deployment.yaml
  - app-service.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: vrs

images:
  - name: ghcr.io/aungyephyo2215/vct-visitor-registration-system
    newTag: latest
