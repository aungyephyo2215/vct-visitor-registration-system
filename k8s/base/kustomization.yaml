apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # PostgreSQL
  - postgres/namespace.yaml
  - postgres/pvc.yaml
  - postgres/configmap.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml

  # Application
  - app/namespace.yaml
  - app/configmap.yaml
  - app/deployment.yaml
  - app/service.yaml
  - app/ingress.yaml
  - app/hpa.yaml

commonLabels:
  app.kubernetes.io/part-of: visitor-registration-system
  managed-by: argocd
