apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # PostgreSQL
  - postgres/namespace.yaml
  # NOTE: PVC is NOT listed here — StatefulSet creates PVCs via volumeClaimTemplates
  # The standalone pvc.yaml was causing an orphaned Pending PVC
  - postgres/configmap.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - postgres/network-policy.yaml
  - postgres/resource-quota.yaml
  - postgres/backup-cronjob.yaml

  # Application
  - app/namespace.yaml
  - app/configmap.yaml
  - app/deployment.yaml
  - app/service.yaml
  - app/ingress.yaml
  - app/hpa.yaml
  - app/network-policy.yaml
  - app/pdb.yaml
  - app/resource-quota.yaml

  # Monitoring Stack (Prometheus + Grafana)
  - monitoring/namespace.yaml
  - monitoring/alert-rules.yaml
  - monitoring/ingress.yaml
  - monitoring/network-policy.yaml
  - monitoring/resource-quota.yaml
  - monitoring/secret.yaml

  # Logging Stack (Loki + Promtail)
  - logging/namespace.yaml
  - logging/network-policy.yaml

commonLabels:
  app.kubernetes.io/part-of: visitor-registration-system
  managed-by: argocd
