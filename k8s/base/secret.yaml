apiVersion: v1
kind: Secret
metadata:
  name: vrs-secret
  namespace: visitor-registration-system
  labels:
    app.kubernetes.io/name: visitor-registration-system
    app.kubernetes.io/component: app
type: Opaque
stringData:
  DB_USER: "vrs_user"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  DATABASE_URL: "postgresql://vrs_user:CHANGE_ME_IN_PRODUCTION@vrs-postgres:5432/vrs_db"
  JWT_SECRET: "CHANGE_ME_JWT_SECRET"
  JWT_REFRESH_SECRET: "CHANGE_ME_REFRESH_SECRET"
