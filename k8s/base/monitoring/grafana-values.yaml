# Grafana Configuration for Visitor Registration System
# Based on Grafana Helm chart

## Admin credentials
adminUser: admin
adminPassword: "" # Set via Secret or environment variable

## Persistence
persistence:
  enabled: true
  type: pvc
  size: 5Gi
  accessMode: ReadWriteOnce

## Resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

## Datasources - Auto-provisioned
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      # Prometheus Datasource
      - name: Prometheus
        type: prometheus
        url: http://prometheus-k8s.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        jsonData:
          httpMethod: POST
          timeInterval: "30s"

      # Loki Datasource
      - name: Loki
        type: loki
        url: http://loki-gateway.logging.svc.cluster.local:80
        access: proxy
        jsonData:
          maxLines: 1000

## Dashboard Providers - Auto-provisioned dashboards
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: "kubernetes"
        orgId: 1
        folder: "Kubernetes"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kubernetes

      - name: "application"
        orgId: 1
        folder: "Application"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/application

## Dashboards - Auto-provisioned
dashboards:
  kubernetes:
    # Kubernetes Cluster Monitoring
    k8s-cluster:
      gnetId: 7249
      revision: 1
      datasource: Prometheus

    # Kubernetes Pods
    k8s-pods:
      gnetId: 6418
      revision: 1
      datasource: Prometheus

    # Kubernetes Nodes
    k8s-nodes:
      gnetId: 14513
      revision: 1
      datasource: Prometheus

    # Kubernetes Resources
    k8s-resources:
      gnetId: 13770
      revision: 1
      datasource: Prometheus

    # Kubernetes Network
    k8s-network:
      gnetId: 11590
      revision: 1
      datasource: Prometheus

    # Kubernetes Storage
    k8s-storage:
      gnetId: 13773
      revision: 1
      datasource: Prometheus

    # Loki Logs
    loki-logs:
      gnetId: 13639
      revision: 1
      datasource: Loki

  application:
    # Visitor Registration App Dashboard
    vrs-app:
      gnetId: 0 # Custom dashboard (create manually)
      revision: 1
      datasource: Prometheus

## Grafana INI config
grafana.ini:
  server:
    root_url: https://grafana.k8s.cmtmm.online
  security:
    admin_user: admin
    admin_password: "" # Set via Secret
  auth:
    disable_login_form: false
  users:
    allow_sign_up: false
    allow_org_create: false
  log:
    mode: console
    level: info

## Service Account
serviceAccount:
  create: true
  name: grafana

## RBAC
rbac:
  create: true

## Service
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

## Pod annotations for Prometheus scraping
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

## Sidecar for dashboards and datasources
sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    label: grafana_dashboard
    folderAnnotation: grafana_folder
  datasources:
    enabled: true
    searchNamespace: ALL
    label: grafana_datasource

## Environment variables
env:
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: "" # Set via Secret
