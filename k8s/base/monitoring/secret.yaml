# Secrets for Monitoring Stack
# IMPORTANT: In production, use External Secrets Operator or Sealed Secrets
# These are placeholder values - replace with actual secrets

apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring-stack
type: Opaque
data:
  # Base64 encoded: admin / changeme123
  # Generate with: echo -n 'your-password' | base64
  admin-user: YWRtaW4=
  admin-password: Y2hhbmdlbWUxMjM=

---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: monitoring-stack
type: Opaque
data:
  # Placeholder TLS certs - replace with actual cert-manager secrets
  # Or use cert-manager annotations on Ingress for automatic TLS
  grafana-tls.crt: ""
  grafana-tls.key: ""
  prometheus-tls.crt: ""
  prometheus-tls.key: ""
  alertmanager-tls.crt: ""
  alertmanager-tls.key: ""

---
# Service Account for Prometheus to access Kubernetes API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-k8s
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: monitoring-stack

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-k8s
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: monitoring-stack
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-k8s
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: monitoring-stack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-k8s
subjects:
  - kind: ServiceAccount
    name: prometheus-k8s
    namespace: monitoring
