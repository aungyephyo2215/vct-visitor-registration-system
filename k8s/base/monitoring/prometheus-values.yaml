# Prometheus Configuration for Visitor Registration System
# Based on kube-prometheus-stack Helm chart

## Prometheus Operator
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Custom ServiceMonitor for VRS app
  serviceMonitorSelectorNilUsesHelmValues: false
  serviceMonitorSelector: {}
  serviceMonitorNamespaceSelector: {}

## Prometheus Configuration
prometheus:
  prometheusSpec:
    # Retention
    retention: 15d
    retentionSize: "15GB"

    # Scrape interval
    scrapeInterval: 30s
    evaluationInterval: 30s

    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: ""
          resources:
            requests:
              storage: 20Gi

    # Resources
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Service Monitor selectors
    serviceMonitorSelector:
      matchLabels: {}
    serviceMonitorNamespaceSelector:
      matchLabels: {}

    # Pod Monitor selectors
    podMonitorSelector:
      matchLabels: {}
    podMonitorNamespaceSelector:
      matchLabels: {}

    # Additional scrape configs for VRS app
    additionalScrapeConfigs:
      - job_name: "visitor-registration-app"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - vrs-app
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2

## Alertmanager Configuration
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
      memory: 256Mi

    # Replicas for HA (set to 1 for single-node)
    replicas: 1

    # Alertmanager config
    config:
      global:
        resolve_timeout: 5m

      route:
        group_by: ["alertname", "namespace", "severity"]
        group_wait: 10s
        group_interval: 10s
        repeat_interval: 12h
        receiver: "default"
        routes:
          - match:
              severity: critical
            receiver: "critical-alerts"
          - match:
              severity: warning
            receiver: "warning-alerts"

      receivers:
        - name: "default"
          # Configure your notification channels here
          # email_configs:
          #   - to: 'your-email@example.com'
          #     from: 'alertmanager@example.com'
          #     smarthost: 'smtp.example.com:587'
          #     auth_username: 'alertmanager@example.com'
          #     auth_password: 'password'

        - name: "critical-alerts"
          # slack_configs:
          #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
          #     channel: '#alerts-critical'
          #     title: '{{ .GroupLabels.alertname }}'
          #     text: '{{ .CommonAnnotations.summary }}'

        - name: "warning-alerts"
          # slack_configs:
          #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
          #     channel: '#alerts-warning'

## Node Exporter
nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

## Kube State Metrics
kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

## Prometheus Rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
