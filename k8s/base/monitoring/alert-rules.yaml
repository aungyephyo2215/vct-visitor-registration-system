# Prometheus Alert Rules for Visitor Registration System
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vrs-alert-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: monitoring-stack
    role: alert-rules
spec:
  groups:
    # =====================================================
    # VRS Application Alerts
    # =====================================================
    - name: visitor-registration-app
      rules:
        # High Error Rate (>5% of requests)
        - alert: VRSHighErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="vrs-app",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{namespace="vrs-app"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
            app: visitor-registration
          annotations:
            summary: "VRS API error rate > 5%"
            description: |
              Error rate is {{ $value | humanizePercentage }} over the last 5 minutes.
              This indicates potential issues with the application.
            runbook_url: "https://github.com/your-org/vrs-docs/runbooks/high-error-rate"

        # High Latency (P99 > 2s)
        - alert: VRSHighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{namespace="vrs-app"}[5m])) by (le)
            ) > 2
          for: 5m
          labels:
            severity: warning
            app: visitor-registration
          annotations:
            summary: "VRS API P99 latency > 2 seconds"
            description: |
              P99 latency is {{ $value }}s over the last 5 minutes.
              Users may be experiencing slow response times.

        # Pod Crash Looping
        - alert: VRSPodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="vrs-app"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
            app: visitor-registration
          annotations:
            summary: "VRS pod is crash looping"
            description: |
              Pod {{ $labels.pod }} has restarted {{ $value }} times in the last 15 minutes.
              Check logs for errors.

        # High Memory Usage (>90%)
        - alert: VRSHighMemoryUsage
          expr: |
            container_memory_usage_bytes{namespace="vrs-app",container="app"}
            /
            container_spec_memory_limit_bytes{namespace="vrs-app",container="app"} > 0.9
          for: 10m
          labels:
            severity: warning
            app: visitor-registration
          annotations:
            summary: "VRS pod memory usage > 90%"
            description: |
              Pod {{ $labels.pod }} memory usage is {{ $value | humanizePercentage }}.
              Consider increasing memory limits.

        # High CPU Usage (>80%)
        - alert: VRSHighCPUUsage
          expr: |
            rate(container_cpu_usage_seconds_total{namespace="vrs-app",container="app"}[5m])
            /
            container_spec_cpu_quota{namespace="vrs-app",container="app"}
            /
            container_spec_cpu_period{namespace="vrs-app",container="app"} > 0.8
          for: 10m
          labels:
            severity: warning
            app: visitor-registration
          annotations:
            summary: "VRS pod CPU usage > 80%"
            description: |
              Pod {{ $labels.pod }} CPU usage is high.
              Consider increasing CPU limits.

        # Pod Not Ready
        - alert: VRSPodNotReady
          expr: |
            kube_pod_status_ready{namespace="vrs-app",condition="true"} == 0
          for: 5m
          labels:
            severity: critical
            app: visitor-registration
          annotations:
            summary: "VRS pod is not ready"
            description: |
              Pod {{ $labels.pod }} has been in not-ready state for 5 minutes.
              Check pod events and logs.

        # HPA at Max Capacity
        - alert: VRSHPAAtMaxCapacity
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace="vrs-app"}
            ==
            kube_horizontalpodautoscaler_spec_max_replicas{namespace="vrs-app"}
          for: 15m
          labels:
            severity: warning
            app: visitor-registration
          annotations:
            summary: "VRS HPA is at maximum capacity"
            description: |
              HPA {{ $labels.horizontalpodautoscaler }} has been at max replicas for 15 minutes.
              Consider increasing max replicas or optimizing the application.

    # =====================================================
    # PostgreSQL Alerts
    # =====================================================
    - name: visitor-registration-database
      rules:
        # High Connection Usage (>80%)
        - alert: PostgreSQLHighConnections
          expr: |
            pg_stat_activity_count{state="active",datname="visitor_registration"}
            /
            pg_settings_max_connections{datname="visitor_registration"} > 0.8
          for: 5m
          labels:
            severity: critical
            app: visitor-registration
          annotations:
            summary: "PostgreSQL connection pool > 80%"
            description: |
              Database connection usage is {{ $value | humanizePercentage }}.
              Consider increasing max_connections or optimizing queries.

        # Long Running Queries (>30s)
        - alert: PostgreSQLLongRunningQueries
          expr: |
            pg_stat_activity_max_tx_duration{state="active",datname="visitor_registration"} > 30
          for: 5m
          labels:
            severity: warning
            app: visitor-registration
          annotations:
            summary: "PostgreSQL long running query detected"
            description: |
              Query running for {{ $value }} seconds. Check for slow queries.

        # Database Down
        - alert: PostgreSQLDown
          expr: pg_up{datname="visitor_registration"} == 0
          for: 1m
          labels:
            severity: critical
            app: visitor-registration
          annotations:
            summary: "PostgreSQL is down"
            description: |
              Database connection has been lost for 1 minute.

        # High Cache Hit Ratio (<99%)
        - alert: PostgreSQLLowCacheHitRatio
          expr: |
            pg_stat_database_blks_hit{datname="visitor_registration"}
            /
            (pg_stat_database_blks_hit{datname="visitor_registration"} + pg_stat_database_blks_read{datname="visitor_registration"})
            < 0.99
          for: 15m
          labels:
            severity: warning
            app: visitor-registration
          annotations:
            summary: "PostgreSQL cache hit ratio < 99%"
            description: |
              Cache hit ratio is {{ $value | humanizePercentage }}.
              Consider increasing shared_buffers.

    # =====================================================
    # Kubernetes Infrastructure Alerts
    # =====================================================
    - name: kubernetes-infrastructure
      rules:
        # Node Not Ready
        - alert: KubernetesNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Kubernetes node not ready"
            description: |
              Node {{ $labels.node }} has been not ready for 5 minutes.

        # High Node Memory Usage
        - alert: KubernetesHighNodeMemoryUsage
          expr: |
            (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
            /
            node_memory_MemTotal_bytes > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node memory usage > 90%"
            description: |
              Node {{ $labels.instance }} memory usage is {{ $value | humanizePercentage }}.

        # High Node Disk Usage
        - alert: KubernetesHighNodeDiskUsage
          expr: |
            (node_filesystem_size_bytes - node_filesystem_avail_bytes)
            /
            node_filesystem_size_bytes > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node disk usage > 90%"
            description: |
              Node {{ $labels.instance }} disk usage is {{ $value | humanizePercentage }}.

        # Pod Pending Too Long
        - alert: KubernetesPodPendingTooLong
          expr: kube_pod_status_phase{phase="Pending"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod pending for > 15 minutes"
            description: |
              Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been pending.
              Check resource availability and events.

        # PVC Pending
        - alert: KubernetesPVCPending
          expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "PVC pending for > 15 minutes"
            description: |
              PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is pending.
              Check storage class and available resources.

    # =====================================================
    # Monitoring Stack Alerts
    # =====================================================
    - name: monitoring-stack
      rules:
        # Prometheus Target Down
        - alert: PrometheusTargetDown
          expr: up == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus target is down"
            description: |
              Target {{ $labels.instance }} has been down for 5 minutes.

        # Prometheus High Memory Usage
        - alert: PrometheusHighMemoryUsage
          expr: |
            process_resident_memory_bytes{job="prometheus"}
            /
            prometheus_tsdb_storage_blocks_bytes > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus memory usage > 80%"
            description: |
              Prometheus memory usage is high. Consider increasing limits.

        # Prometheus Storage Full
        - alert: PrometheusStorageFull
          expr: |
            prometheus_tsdb_storage_blocks_bytes
            /
            prometheus_tsdb_storage_blocks_limit_bytes > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Prometheus storage > 90% full"
            description: |
              Prometheus storage is almost full. Free up space or increase limits.
