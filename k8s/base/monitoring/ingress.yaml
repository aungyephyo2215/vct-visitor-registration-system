# Ingress for Monitoring Stack (Grafana, Prometheus, Alertmanager)
# Access via Traefik on *.k8s.cmtmm.online

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring-stack
  annotations:
    # Traefik annotations
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Rate limiting
    traefik.ingress.kubernetes.io/rate-limit: "100"
    # CORS (if needed for API access)
    traefik.ingress.kubernetes.io/cors-allow-originlist: "*"
    traefik.ingress.kubernetes.io/cors-allow-methods: "GET,POST,PUT,DELETE,OPTIONS"
    traefik.ingress.kubernetes.io/cors-allow-headers: "Authorization,Content-Type,Accept"
    # Security headers
    traefik.ingress.kubernetes.io/headers-customrequestheaders: |
      X-Frame-Options: DENY
      X-Content-Type-Options: nosniff
      X-XSS-Protection: 1; mode=block
      Referrer-Policy: strict-origin-when-cross-origin
      Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.k8s.cmtmm.online
      secretName: grafana-tls
  rules:
    - host: grafana.k8s.cmtmm.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-grafana
                port:
                  number: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: monitoring-stack
  annotations:
    # Traefik annotations
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Rate limiting
    traefik.ingress.kubernetes.io/rate-limit: "50"
    # Security headers
    traefik.ingress.kubernetes.io/headers-customrequestheaders: |
      X-Frame-Options: DENY
      X-Content-Type-Options: nosniff
      X-XSS-Protection: 1; mode=block
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - prometheus.k8s.cmtmm.online
      secretName: prometheus-tls
  rules:
    - host: prometheus.k8s.cmtmm.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-k8s
                port:
                  number: 9090

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: monitoring-stack
  annotations:
    # Traefik annotations
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Rate limiting
    traefik.ingress.kubernetes.io/rate-limit: "30"
    # Security headers
    traefik.ingress.kubernetes.io/headers-customrequestheaders: |
      X-Frame-Options: DENY
      X-Content-Type-Options: nosniff
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - alertmanager.k8s.cmtmm.online
      secretName: alertmanager-tls
  rules:
    - host: alertmanager.k8s.cmtmm.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alertmanager-main
                port:
                  number: 9093
