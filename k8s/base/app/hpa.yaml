apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vrs-app
  namespace: vrs-app
  labels:
    app.kubernetes.io/name: visitor-registration-system
    app.kubernetes.io/component: application
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vrs-app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
