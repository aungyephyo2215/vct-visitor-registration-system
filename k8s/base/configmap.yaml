apiVersion: v1
kind: ConfigMap
metadata:
  name: vrs-config
  namespace: visitor-registration-system
  labels:
    app.kubernetes.io/name: visitor-registration-system
    app.kubernetes.io/component: app
data:
  NODE_ENV: "production"
  DB_HOST: "vrs-postgres"
  DB_PORT: "5432"
  DB_NAME: "vrs_db"
  JWT_EXPIRES_IN: "24h"
  JWT_REFRESH_EXPIRES_IN: "7d"
  BCRYPT_ROUNDS: "12"
  QR_EXPIRES_MINUTES: "1440"
  NEXT_TELEMETRY_DISABLED: "1"
