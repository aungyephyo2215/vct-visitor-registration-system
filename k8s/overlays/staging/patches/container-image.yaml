apiVersion: apps/v1
kind: Deployment
metadata:
  name: vrs-app
  namespace: vrs-app
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
        - name: run-migrations
          image: docker.io/aungkyawmyint/vrs:staging
          imagePullPolicy: Always
        - name: seed-database
          image: docker.io/aungkyawmyint/vrs:staging
          imagePullPolicy: Always
      containers:
        - name: vrs-app
          image: docker.io/aungkyawmyint/vrs:staging
          imagePullPolicy: Always
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
