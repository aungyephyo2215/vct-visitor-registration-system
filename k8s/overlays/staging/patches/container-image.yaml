apiVersion: apps/v1
kind: Deployment
metadata:
  name: vrs-app
  namespace: vrs-app
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
        - name: run-migrations
          image: ghcr.io/aungkyephyo2215/vct-visitor-registration-system:staging
          imagePullPolicy: IfNotPresent
        - name: seed-database
          image: ghcr.io/aungkyephyo2215/vct-visitor-registration-system:staging
          imagePullPolicy: IfNotPresent
      containers:
        - name: vrs-app
          # Locally built image
          image: ghcr.io/aungkyephyo2215/vct-visitor-registration-system:staging
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
