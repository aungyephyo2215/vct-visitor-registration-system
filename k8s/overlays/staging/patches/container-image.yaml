apiVersion: apps/v1
kind: Deployment
metadata:
  name: vrs-app
  namespace: vrs-app
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
        - name: run-migrations
          image: docker.io/library/vrs-app:staging
          imagePullPolicy: Never
        - name: seed-database
          image: docker.io/library/vrs-app:staging
          imagePullPolicy: Never
      containers:
        - name: vrs-app
          # Locally built image (docker build + import to containerd)
          image: docker.io/library/vrs-app:staging
          imagePullPolicy: Never
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
