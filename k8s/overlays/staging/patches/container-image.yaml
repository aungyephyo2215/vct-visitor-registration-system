apiVersion: apps/v1
kind: Deployment
metadata:
  name: vrs-app
  namespace: vrs-app
spec:
  template:
    spec:
      containers:
        - name: vrs-app
          image: ghcr.io/aungyephyo2215/visitor-registration-system:staging-amd64
          imagePullPolicy: Always
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
