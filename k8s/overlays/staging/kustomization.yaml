apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: visitor-registration-system-staging

resources:
  - ../../base

namespace: visitor-registration-system-staging

namePrefix: staging-
nameSuffix: ""

commonLabels:
  environment: staging

patches:
  # Single replica for staging
  - target:
      kind: Deployment
      name: vrs-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Medium resources for staging
  - target:
      kind: Deployment
      name: vrs-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  # Staging ingress
  - target:
      kind: Ingress
      name: vrs-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: vrs-staging.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: vrs-staging.example.com
      - op: replace
        path: /spec/tls/0/secretName
        value: vrs-staging-tls

  # Medium PVC for staging
  - target:
      kind: PersistentVolumeClaim
      name: vrs-postgres-pvc
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 3Gi

images:
  - name: ghcr.io/aungyephyo2215/vct-visitor-registration-system
    newTag: staging-latest
