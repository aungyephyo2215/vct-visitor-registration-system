apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: visitor-registration-system
  namespace: argocd
  labels:
    app.kubernetes.io/name: visitor-registration-system
    app.kubernetes.io/part-of: vrs
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/aungyephyo2215/vct-visitor-registration-system.git
    targetRevision: staging/argocd-k8s-lab
    path: k8s/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: visitor-registration-system-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
