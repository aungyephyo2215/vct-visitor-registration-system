apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: visitor-registration-system
  namespace: argocd
  labels:
    app.kubernetes.io/name: visitor-registration-system
    app.kubernetes.io/part-of: vrs
spec:
  generators:
    - list:
        elements:
          - env: dev
            branch: staging/argocd-k8s-lab
            path: k8s/overlays/dev
            namespace: visitor-registration-system-dev
          - env: staging
            branch: staging/argocd-k8s-lab
            path: k8s/overlays/staging
            namespace: visitor-registration-system-staging
          - env: production
            branch: main
            path: k8s/overlays/production
            namespace: visitor-registration-system-production

  template:
    metadata:
      name: "visitor-registration-system-{{env}}"
      labels:
        app.kubernetes.io/name: visitor-registration-system
        app.kubernetes.io/part-of: vrs
        environment: "{{env}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/aungyephyo2215/vct-visitor-registration-system.git
        targetRevision: "{{branch}}"
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 10
