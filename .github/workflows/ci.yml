name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ── Fast checks (no DB needed) ──────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Check formatting
        run: npm run format:check

  # ── Unit tests (with PostgreSQL) ─────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vrs_user
          POSTGRES_PASSWORD: vrs_password
          POSTGRES_DB: vrs_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vrs_user:vrs_password@localhost:5432/vrs_db
      JWT_SECRET: ci-jwt-secret-for-testing-only
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-for-testing-only

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

      - name: Upload test results on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results
          path: test-results/

  # ── Build ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    env:
      DATABASE_URL: postgresql://vrs_user:vrs_password@localhost:5432/vrs_db
      JWT_SECRET: ci-jwt-secret-for-build-only
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-for-build-only

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Security audit ────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high || true
