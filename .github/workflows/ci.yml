name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://vrs_user:vrs_password@localhost:5432/vrs_db
  JWT_SECRET: ci-jwt-secret-for-build
  JWT_REFRESH_SECRET: ci-jwt-refresh-secret-for-build

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vrs_user
          POSTGRES_PASSWORD: vrs_password
          POSTGRES_DB: vrs_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build
