version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Yangon"
    open-pull-requests-limit: 10
    reviewers:
      - "aungyephyo2215"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps):"
    groups:
      production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Major version bumps — grouped separately so they can be reviewed
      # carefully for breaking changes before merging.
      major:
        update-types:
          - "major"
    # Ignore known-incompatible major bumps until upstream fixes them.
    # eslint 10 breaks eslint-config-next (typescript-eslint crash).
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Yangon"
    labels:
      - "dependencies"
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci(deps):"
